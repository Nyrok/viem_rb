AllCops:
  NewCops: enable
  TargetRubyVersion: 2.6
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "bin/**/*"

# Line length
Layout/LineLength:
  Max: 120

# Method length
Metrics/MethodLength:
  Max: 30

# Block length
Metrics/BlockLength:
  Max: 60
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

# Class length
Metrics/ClassLength:
  Max: 200

# ABC size
Metrics/AbcSize:
  Max: 30

# Documentation is not required for modules/classes
Style/Documentation:
  Enabled: false

# viem API mirrors viem.sh naming (get_, is_) — disable these cops
Naming/AccessorMethodName:
  Enabled: false

Naming/PredicatePrefix:
  Enabled: false

# Ethereum actions are inherently complex
Metrics/CyclomaticComplexity:
  Max: 15

Metrics/PerceivedComplexity:
  Max: 15

Metrics/ModuleLength:
  Max: 200

# Chain definitions, typed data, contract writes need more params
Metrics/ParameterLists:
  Max: 12

# short variable names (e.g. `to`, `v`) are idiomatic in Ethereum
Naming/MethodParameterName:
  Enabled: false

# Duplicate branch: accept in complex case/when Ethereum logic
Lint/DuplicateBranch:
  Enabled: false

# Unused method args in interface methods are intentional
Lint/UnusedMethodArgument:
  Enabled: false

# Missing super in transport initializers is intentional (no state in Base)
Lint/MissingSuper:
  Enabled: false

# Useless constant scoping false positive
Lint/UselessConstantScoping:
  Enabled: false

# Allow trailing commas in multi-line literals
Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

# Allow guard clauses
Style/GuardClause:
  Enabled: true

# Prefer double-quoted strings
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Allow numeric separators
Style/NumericLiterals:
  Enabled: false

# Allow rescue with StandardError
Style/RescueStandardError:
  EnforcedStyle: implicit

# Gemspec
Gemspec/DevelopmentDependencies:
  Enabled: false
